services:
  orders-service:
    build:
      context: .
      dockerfile: platform-logging-example/Dockerfile
    image: chua-erp/orders-service:dev
    container_name: orders-service
    environment:
      ENVIRONMENT: dev
      SERVER_PORT: 8080
      APP_VERSION: 1.0.0-local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
