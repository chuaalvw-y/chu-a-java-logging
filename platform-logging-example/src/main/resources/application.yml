spring:
  application:
    name: orders-service
  profiles:
    active: ${ENVIRONMENT:dev}

server:
  port: ${SERVER_PORT:8080}

# Defaults shown for documentation; per-environment overrides live in application-{profile}.yml.
platform:
  logging:
    enabled: true

    metadata:
      application-name: ${spring.application.name}
      environment: ${spring.profiles.active}
      version: ${APP_VERSION:0.0.0-dev}
      # host: resolved from InetAddress.getLocalHost() when blank

    correlation:
      enabled: true
      header-name: X-Correlation-Id
      mdc-key: correlationId
      generate-if-missing: true
      include-in-response: true

    request-logging:
      enabled: true
      include-query-string: true
      include-headers: false
      include-payload: false
      max-payload-length: 2048
      excluded-paths:
        - /actuator/**
        - /health
        - /metrics
        - /v3/api-docs/**
        - /swagger-ui/**

    masking:
      enabled: true
      mask: "****"
      sensitive-fields:
        - password
        - token
        - accessToken
        - refreshToken
        - apiKey
        - authorization
        - ssn
        - taxId
        - accountNumber
        - cardNumber
        - cvv
      sensitive-headers:
        - Authorization
        - Cookie
        - X-Api-Key
      additional-patterns: []

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.company.platform.logging: INFO
