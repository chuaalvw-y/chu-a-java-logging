platform:
  logging:
    request-logging:
      include-headers: false
      include-payload: false
      excluded-paths:
        - /actuator/**
        - /health
        - /metrics
        - /v3/api-docs/**
        - /swagger-ui/**

management:
  endpoints:
    web:
      exposure:
        # Tighter exposure in prod; prometheus scrape requires explicit allow.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.company.platform.logging: INFO
